name: CI

on:
  push:
    branches: [main, master, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:

  # --------------------------------------------------------------------------
  # Backend: lint + unit tests + API tests
  # --------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aifficient_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d aifficient_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Write test .env
        run: |
          cat > .env <<EOF
          APP_NAME=Aifficient
          ENV=test
          DATABASE_URL=postgresql+psycopg2://test:test@localhost:5432/aifficient_test
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET=test-secret-at-least-32-characters-long
          JWT_EXPIRE_MINUTES=30
          RATE_LIMIT_ENABLED=false
          LOG_LEVEL=WARNING
          LOG_JSON=false
          INTERNAL_SERVICE_TOKEN=test-internal-token
          INTERNAL_API_BASE_URL=http://localhost:8000
          EOF

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short -q

      - name: Run API tests
        run: pytest tests/api/ -v --tb=short -q --ignore=tests/api/test_campaign_dialing_e2e.py

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short -q

      - name: Run E2E campaign lifecycle tests
        run: pytest tests/e2e/test_campaign_lifecycle.py -v --tb=short -q

  # --------------------------------------------------------------------------
  # Backend: security / linting
  # --------------------------------------------------------------------------
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linting tools
        run: pip install ruff pyright

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Check for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # Advisory until baseline is confirmed clean

  # --------------------------------------------------------------------------
  # Frontend: type-check + build
  # --------------------------------------------------------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write .env
        run: echo "VITE_API_URL=/api/v1" > .env

      - name: TypeScript type-check
        run: npx tsc --noEmit
        continue-on-error: true  # Pre-existing WorkflowBuilder.tsx errors

      - name: Vite build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # --------------------------------------------------------------------------
  # Docker: build production images
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: aifficient-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: false
          tags: aifficient-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Deploy to staging (manual trigger only)
  # --------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy to staging server
        run: echo "Add your staging deploy steps here (SSH, ECS update, etc.)"
