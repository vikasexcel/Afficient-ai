# pytest configuration for the Aifficient backend test suite.
#
# - asyncio_mode = "auto"  → @pytest.mark.asyncio-less tests still work.
# - testpaths anchors discovery to the local tests/ folder.
[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning
