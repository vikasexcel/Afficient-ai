# pytest configuration for the Aifficient backend test suite.
#
# - asyncio_mode = "auto"  → @pytest.mark.asyncio-less tests still work.
# - testpaths anchors discovery to the local tests/ folder.
# - Custom markers segment the suite: `unit`, `integration`, `api`,
#   `performance`, `latency`, `external`. The default invocation runs
#   the unit + integration + api tests; performance and latency are
#   opt-in via the wrapper scripts in tests/README.md.
[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning
markers =
    unit: pure-Python unit tests (no DB, Redis, or network).
    integration: tests that touch local Postgres and/or Redis.
    api: HTTP endpoint tests via FastAPI TestClient.
    performance: throughput / concurrency benchmarks (record metrics).
    latency: per-call latency benchmarks (record metrics).
    external: requires live third-party providers (OpenAI, Deepgram, ElevenLabs, LiveKit, Twilio).
    slow: opt-in via `-m slow`; excluded from default runs.
