# =============================================================================
# Aifficient — Production Docker Compose
# =============================================================================
# Prerequisites:
#   1. Copy backend/.env.example to backend/.env and fill every value.
#   2. Copy frontend/.env.example to frontend/.env and set VITE_API_URL.
#   3. docker compose -f docker-compose.prod.yml build
#   4. docker compose -f docker-compose.prod.yml up -d
#
# This compose file is suitable for a single-host production server.
# For multi-host / HA setups, use the AWS App Runner guide in docs/DEPLOY_AWS.md.
#
# Secrets management: never commit .env files. Use Docker Secrets or a
# secrets manager (AWS Secrets Manager, HashiCorp Vault) in production.
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  internal:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  voicemail_uploads:

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: backend/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aifficient}
      POSTGRES_USER: ${POSTGRES_USER:-aifficient}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aifficient} -d ${POSTGRES_DB:-aifficient}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Expose on loopback only so external access requires explicit tunnel / VPN
    ports:
      - "127.0.0.1:5432:5432"

  # --------------------------------------------------------------------------
  # Redis 7
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"

  # --------------------------------------------------------------------------
  # Database migration runner (one-shot — exits after applying migrations)
  # --------------------------------------------------------------------------
  migrate:
    build:
      context: backend
      dockerfile: Dockerfile
    image: aifficient-backend:latest
    command: alembic upgrade head
    env_file: backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  # --------------------------------------------------------------------------
  # FastAPI backend
  # --------------------------------------------------------------------------
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    image: aifficient-backend:latest
    restart: unless-stopped
    env_file: backend/.env
    environment:
      ENV: production
      LOG_JSON: "true"
      ENABLE_METRICS: "true"
    volumes:
      - voicemail_uploads:/app/uploads/voicemail
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Celery worker (campaign execution)
  # --------------------------------------------------------------------------
  celery-worker:
    build:
      context: backend
      dockerfile: Dockerfile
    image: aifficient-backend:latest
    command: celery -A modules.campaign.scheduler worker -l info -Q celery --concurrency=4 --max-tasks-per-child=100
    restart: unless-stopped
    env_file: backend/.env
    environment:
      ENV: production
      LOG_JSON: "true"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      test: ["CMD", "celery", "-A", "modules.campaign.scheduler", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Celery Beat scheduler (campaign dispatch ticker)
  # --------------------------------------------------------------------------
  celery-beat:
    build:
      context: backend
      dockerfile: Dockerfile
    image: aifficient-backend:latest
    command: celery -A modules.campaign.scheduler beat -l info --max-interval=60
    restart: unless-stopped
    env_file: backend/.env
    environment:
      ENV: production
      LOG_JSON: "true"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    # Only one beat instance should run at a time — guard with a lock if
    # scaling the service to multiple replicas.
    deploy:
      replicas: 1
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Frontend (production build served by nginx)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "127.0.0.1:3000:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
