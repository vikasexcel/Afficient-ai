server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively (hashed filenames from Vite)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health probe — used by Docker healthcheck and load balancer
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # API proxy — forward /api/* to the backend container
    # (Only used when backend and frontend are on the same Docker network.
    #  In production with a separate API domain, remove this block and set
    #  VITE_API_URL to the full API URL at build time.)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Voicemail media proxy
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
    }

    # SPA fallback — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
